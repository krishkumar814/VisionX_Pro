{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center items-center">
    <div class="fixed top-32 right-1/4 w-80 h-80 bg-brand-400 rounded-full filter blur-3xl opacity-[0.06] animate-pulse pointer-events-none"></div>
    <div class="fixed bottom-32 left-1/4 w-80 h-80 bg-purple-400 rounded-full filter blur-3xl opacity-[0.06] animate-pulse pointer-events-none" style="animation-delay: 1.5s;"></div>
    
    <div class="card max-w-md w-full relative z-10">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 mx-auto rounded-xl bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center text-brand-600 dark:text-brand-400 mb-4">
                    <i class="fa-solid fa-bolt text-xl"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight">
                    Welcome Back
                </h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
                    Sign in to your VisionX Pro dashboard
                </p>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required placeholder="you@visionx.pro" class="input">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required placeholder="••••••••" class="input">
                </div>

                <button type="submit" class="btn-primary w-full py-3 mt-2">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
                </button>
                
                <p class="text-center text-[11px] text-gray-400 dark:text-gray-500 mt-4">
                    Identities are managed by your Administration.
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
